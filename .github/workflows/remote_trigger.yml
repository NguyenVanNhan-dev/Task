name: Remote Trigger Crawl

on:
  repository_dispatch:
    types: [trigger-crawl]

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Fix cho Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libglib2.0-0 \
            libnss3 \
            libnspr4 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 \
            libpango-1.0-0 \
            libcairo2

      - name: Setup Chrome Browser
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install undetected-chromedriver selenium gspread google-auth google-auth-oauthlib IPython webdriver_manager

      - name: Create credentials file
        run: |
          echo '${{ secrets.CREDS_JSON }}' > vivid-layout-492502-m1-ec6b14b41e28.json

      - name: Run Script
        env:
          LINKEDIN_COOKIES: ${{ secrets.LINKEDIN_COOKIES }}
        run: |
          xvfb-run -a python Crawl_LinkedIn_Profiles_2.py
      - name: Upload Screenshots
        if: always()                    # Luôn upload dù thành công hay lỗi
        uses: actions/upload-artifact@v4
        with:
          name: linkedin-screenshots
          path: ./*.png
          retention-days: 7
